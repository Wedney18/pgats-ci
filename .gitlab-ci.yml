stages:
  - quality

variables:
  NODE_VERSION: '24'
  CI_TIMEOUT: '1800'
  NODE_ENV: 'test'

cache:
  paths:
    - node_modules/

before_script:
  - npm install --legacy-peer-deps

# Job: Linting e Type Checking
lint:
  stage: quality
  image: node:${NODE_VERSION}

  timeout: 10m

  script:
    - npm run lint:ts

# Job: Testes Unitários
test:unit:
  stage: quality
  image: node:${NODE_VERSION}

  timeout: 15m
  parallel: 3

  script:
    - npm test -- --coverage

  artifacts:
    when: always
    paths:
      - reports/coverage/
    expire_in: 30 days

  coverage: '/Lines\s*:\s*(\d+\.\d+)%/'

# Job: Testes E2E
test:e2e:
  stage: quality
  image: node:${NODE_VERSION}

  timeout: 40m
  needs:
    - lint
    - test:unit

  script:
    - npm exec playwright install --with-deps
    - npm run e2e

  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 30 days

  retry:
    max: 1
    when:
      - runner_system_failure

