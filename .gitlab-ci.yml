stages:
  - quality

variables:
  NODE_VERSION: '24'
  CI_TIMEOUT: '1800'
  YARN_CACHE_FOLDER: '.yarn-cache'
  NODE_ENV: 'test'

cache:
  paths:
    - node_modules/
    - .yarn-cache/

before_script:
  - command -v yarn >/dev/null 2>&1 || npm install -g yarn
  - yarn install --frozen-lockfile

# Job: Linting e Type Checking
lint:
  stage: quality
  image: node:${NODE_VERSION}

  timeout: 10m

  script:
    - yarn lint:ts
    - yarn lint:format

  expire_in: 7 days

# Job: Testes Unitários
test:unit:
  stage: quality
  image: node:${NODE_VERSION}

  timeout: 15m
  parallel: 3

  script:
    - yarn test -- --coverage

  artifacts:
    when: always
    paths:
      - reports/coverage/
    expire_in: 30 days

  coverage: '/Lines\s*:\s*(\d+\.\d+)%/'

# Job: Testes E2E
test:e2e:
  stage: quality
  image: node:${NODE_VERSION}

  timeout: 20m
  needs:
    - lint
    - test:unit

  script:
    - npx playwright install --with-deps
    - yarn e2e

  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 30 days

  retry:
    max: 1
    when:
      - runner_system_failure

