# CI de Nível 01 - Disparo Manual através de clique

# nome da pipeline
name: 'Execução Manual'

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch

on: 
    workflow_dispatch:

#tarefas dentro da pipeline = jobs

jobs: 

    e2e-tests:
        #máquina onde o job vai rodar
        runs-on: ubuntu-latest

        # passos do job
        steps:
            # clone do projeto
            - uses: actions/checkout@v5

            # instalação do node
            - uses: actions/setup-node@v5
              with:
                node-version: 24.x

            # instalação do Yarn
            - name: Instalando Yarn
              run: npm install -g yarn

            # instalação das dependências
            - name: Instalando dependências
              run: yarn

            # instalação dos Browsers do Playwright
            - name: Instalando Browsers do Playwright
              run: yarn playwright install

            # executar os testes e2e
            - name: Executando os testes e2e
              run: yarn run e2e
              
            - name: Publicar Relatório HTML
              uses: actions/upload-artifact@v5

            - name: Verificar relatório gerado
              if: always()
              run: |
              echo "Conteúdo do projeto:"
              ls -R

              # Garante o upload mesmo se os testes quebrarem  
              if: always() 
              with:
              # Nome do arquivo zip que será gerado
                name: relatorio-html-testes 

              # Pasta onde o relatório HTML foi gerado 
                path: playwright-report/

              # Tempo que o arquivo ficará guardado no GitHub
                retention-days: 90                        